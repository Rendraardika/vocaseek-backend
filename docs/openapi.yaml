openapi: 3.0.3
info:
  title: Vocaseek API
  version: 1.2.0
  description: |
    Dokumentasi API Vocaseek untuk kebutuhan integrasi frontend, QA, dan eksplorasi endpoint lewat Swagger UI.
    Server API memakai path relatif agar tetap cocok di environment lokal maupun deployment.
servers:
  - url: /api
    description: Relative API base URL
tags:
  - name: Public
  - name: Auth
  - name: Preferences
  - name: Intern
  - name: Company
  - name: Talent Pool
  - name: Admin
components:
  parameters:
    LocaleHeader:
      name: X-Locale
      in: header
      required: false
      description: Pilih bahasa respons backend.
      schema:
        type: string
        enum: [id, en]
        default: id
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: integer
    JobIdPath:
      name: jobId
      in: path
      required: true
      schema:
        type: integer
    VerificationIdPath:
      name: id
      in: path
      required: true
      schema:
        type: integer
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Token
  schemas:
    StatusMessage:
      type: object
      properties:
        status:
          type: string
          example: success
        message:
          type: string
          example: Operasi berhasil.
    ErrorMessage:
      type: object
      properties:
        status:
          type: string
          example: error
        message:
          type: string
          example: Terjadi kesalahan.
    ValidationError:
      type: object
      properties:
        message:
          type: string
          example: The given data was invalid.
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: rendra@example.com
        password:
          type: string
          example: password123
    LoginResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        token:
          type: string
          example: 1|sanctum-token
        role:
          type: string
          example: intern
        user:
          type: string
          example: Rendra
    RegisterInternRequest:
      type: object
      required: [nama, email, password, password_confirmation, notelp, role]
      properties:
        nama:
          type: string
          example: Rendra
        email:
          type: string
          format: email
          example: rendra@example.com
        password:
          type: string
          example: password123
        password_confirmation:
          type: string
          example: password123
        notelp:
          type: string
          example: "08123456789"
        role:
          type: string
          enum: [intern]
    RegisterCompanyRequest:
      type: object
      required: [nama, email, password, password_confirmation, notelp, role]
      properties:
        nama:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
        password_confirmation:
          type: string
        notelp:
          type: string
        role:
          type: string
          enum: [company]
        loa_pdf:
          type: string
          format: binary
        akta_pdf:
          type: string
          format: binary
    MeResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        data:
          type: object
          properties:
            user_id:
              type: integer
            nama:
              type: string
            email:
              type: string
            role:
              type: string
            notelp:
              type: string
            google_id:
              type: string
              nullable: true
    LanguageResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        data:
          type: object
          properties:
            locale:
              type: string
              example: id
    GoogleTokenRequest:
      type: object
      required: [access_token]
      properties:
        access_token:
          type: string
    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
    ResetTokenValidationRequest:
      type: object
      required: [email, token]
      properties:
        email:
          type: string
          format: email
        token:
          type: string
    ResetPasswordRequest:
      type: object
      required: [email, token, password, password_confirmation]
      properties:
        email:
          type: string
          format: email
        token:
          type: string
        password:
          type: string
        password_confirmation:
          type: string
    InvitationVerifyResponse:
      type: object
      properties:
        status:
          type: string
        data:
          type: object
          properties:
            invitation_id:
              type: integer
            name:
              type: string
            email:
              type: string
            phone:
              type: string
              nullable: true
            role:
              type: string
            expires_at:
              type: string
              format: date-time
              nullable: true
            invited_by:
              type: string
              nullable: true
            state:
              type: string
    InvitationTokenRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
    InvitationAcceptRequest:
      type: object
      required: [token, password, password_confirmation]
      properties:
        token:
          type: string
        password:
          type: string
        password_confirmation:
          type: string
    PretestSubmitRequest:
      type: object
      required: [answers]
      properties:
        answers:
          type: array
          items:
            type: object
            required: [question_id, selected_option]
            properties:
              question_id:
                type: integer
              selected_option:
                type: string
    JobApplyRequest:
      type: object
      required: [job_id]
      properties:
        job_id:
          type: integer
    JobStatusUpdateRequest:
      type: object
      properties:
        status:
          type: string
          example: REVIEW
    CompanyJobRequest:
      type: object
      properties:
        judul_posisi:
          type: string
        judul_pekerjaan:
          type: string
        deskripsi_pekerjaan:
          type: string
        persyaratan:
          type: string
        lokasi:
          type: string
        tipe_magang:
          type: string
        gaji_per_bulan:
          type: number
        tanggal_penutupan_lamaran:
          type: string
          format: date
        tanggal_mulai_kerja:
          type: string
          format: date
        status:
          type: string
          example: ACTIVE
    CandidateManualRequest:
      type: object
      properties:
        nama:
          type: string
        email:
          type: string
          format: email
        notelp:
          type: string
        asal_kampus:
          type: string
        prodi:
          type: string
    VerificationReviewRequest:
      type: object
      properties:
        status:
          type: string
          example: reviewed
    VerificationFinalRequest:
      type: object
      properties:
        action:
          type: string
          enum: [approve, reject]
        status:
          type: string
          enum: [approve, reject]
    ManagedAdminStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [active, disabled]
    AdminInviteRequest:
      type: object
      required: [name, email, role]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        role:
          type: string
          enum: [staff_admin]
paths:
  /landing-stats:
    get:
      tags: [Public]
      summary: Statistik landing page
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
      responses:
        '200':
          description: Statistik publik

  /popular-vacancies:
    get:
      tags: [Public]
      summary: Ambil lowongan aktif untuk landing page
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
      responses:
        '200':
          description: Daftar lowongan publik

  /partners:
    get:
      tags: [Public]
      summary: Ambil semua partner aktif
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: per_page
          in: query
          required: false
          schema:
            type: integer
            example: 12
      responses:
        '200':
          description: Daftar partner aktif

  /test:
    get:
      tags: [Public]
      summary: Health check API
      responses:
        '200':
          description: API aktif

  /register:
    post:
      tags: [Auth]
      summary: Registrasi user
      description: |
        `intern` memakai `application/json`.
        `company` memakai `multipart/form-data` karena upload `loa_pdf` dan `akta_pdf`.
        Akun `company` tidak langsung mendapat token dan harus menunggu approval super admin sebelum bisa login.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterInternRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RegisterCompanyRequest'
      responses:
        '201':
          description: Registrasi berhasil
        '422':
          description: Validasi gagal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /login:
    post:
      tags: [Auth]
      summary: Login email/password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login berhasil
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Login gagal
        '403':
          description: Company belum disetujui super admin

  /admin/invitations/verify:
    get:
      tags: [Auth]
      summary: Verifikasi token undangan admin
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Token invitation valid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvitationVerifyResponse'
        '409':
          description: Invitation sudah dipakai
        '410':
          description: Invitation kedaluwarsa
        '422':
          description: Token tidak valid

  /admin/invitations/accept:
    post:
      tags: [Auth]
      summary: Aktivasi akun admin dari token undangan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvitationAcceptRequest'
      responses:
        '200':
          description: Akun admin berhasil diaktifkan
        '409':
          description: Invitation sudah dipakai
        '410':
          description: Invitation kedaluwarsa
        '422':
          description: Validasi gagal

  /email/verify/{id}/{hash}:
    get:
      tags: [Auth]
      summary: Verifikasi email user aktif
      parameters:
        - $ref: '#/components/parameters/IdPath'
        - name: hash
          in: path
          required: true
          schema:
            type: string
        - name: expires
          in: query
          schema:
            type: integer
        - name: signature
          in: query
          schema:
            type: string
      responses:
        '302':
          description: Redirect ke frontend / halaman status verifikasi

  /email/pending-verify/{id}/{hash}:
    get:
      tags: [Auth]
      summary: Verifikasi email untuk pending registration
      parameters:
        - $ref: '#/components/parameters/IdPath'
        - name: hash
          in: path
          required: true
          schema:
            type: string
        - name: expires
          in: query
          schema:
            type: integer
        - name: signature
          in: query
          schema:
            type: string
      responses:
        '302':
          description: Redirect ke frontend / halaman status verifikasi

  /email/verification-notification:
    post:
      tags: [Auth]
      summary: Kirim ulang email verifikasi
      responses:
        '200':
          description: Email verifikasi dikirim ulang
        '429':
          description: Terkena throttle

  /auth/google:
    get:
      tags: [Auth]
      summary: Mulai login Google via browser redirect
      responses:
        '302':
          description: Redirect ke Google OAuth

  /auth/google/callback:
    get:
      tags: [Auth]
      summary: Callback Google OAuth
      responses:
        '302':
          description: Redirect hasil login

  /auth/google/token:
    post:
      tags: [Auth]
      summary: Login Google via access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GoogleTokenRequest'
      responses:
        '200':
          description: Login Google berhasil
        '401':
          description: Token tidak valid

  /forgot-password:
    post:
      tags: [Auth]
      summary: Kirim email reset password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '200':
          description: Jika email terdaftar, tautan reset dikirim
        '500':
          description: Gagal kirim email

  /forgot-password/validate-token:
    post:
      tags: [Auth]
      summary: Validasi token reset password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetTokenValidationRequest'
      responses:
        '200':
          description: Token valid
        '400':
          description: Token tidak valid atau kedaluwarsa

  /reset-password:
    post:
      tags: [Auth]
      summary: Simpan password baru
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password berhasil diperbarui
        '400':
          description: Token reset tidak valid
        '422':
          description: Validasi gagal

  /language:
    get:
      tags: [Preferences]
      summary: Ambil preferensi bahasa user login
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Bahasa aktif user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LanguageResponse'
    put:
      tags: [Preferences]
      summary: Update preferensi bahasa user login
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [locale]
              properties:
                locale:
                  type: string
                  enum: [id, en]
      responses:
        '200':
          description: Bahasa berhasil diperbarui

  /preferences/language:
    get:
      tags: [Preferences]
      summary: Alias ambil preferensi bahasa
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Bahasa aktif user
    put:
      tags: [Preferences]
      summary: Alias update preferensi bahasa
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [locale]
              properties:
                locale:
                  type: string
                  enum: [id, en]
      responses:
        '200':
          description: Bahasa berhasil diperbarui

  /me:
    get:
      tags: [Auth]
      summary: Ambil user login
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profil user login
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          description: Unauthorized

  /logout:
    post:
      tags: [Auth]
      summary: Logout token aktif
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logout berhasil
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusMessage'

  /intern/profile:
    get:
      tags: [Intern]
      summary: Ambil profil intern
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profil intern

  /intern/test/questions:
    get:
      tags: [Intern]
      summary: Ambil soal pre-test subjektif
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Daftar soal pre-test
        '403':
          description: Profil belum lengkap atau test sudah selesai

  /intern/update-profile:
    post:
      tags: [Intern]
      summary: Update profil intern via multipart
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                foto:
                  type: string
                  format: binary
                cv_pdf:
                  type: string
                  format: binary
                dokumen_pendidikan_pdf:
                  type: string
                  format: binary
                education_document:
                  type: string
                  format: binary
                portofolio_pdf:
                  type: string
                  format: binary
                surat_rekomendasi_pdf:
                  type: string
                  format: binary
                ktp_pdf:
                  type: string
                  format: binary
                transkrip_nilai_pdf:
                  type: string
                  format: binary
                tentang_saya:
                  type: string
                tempat_lahir:
                  type: string
                tanggal_lahir:
                  type: string
                  format: date
                jenis_kelamin:
                  type: string
                provinsi:
                  type: string
                kabupaten:
                  type: string
                detail_alamat:
                  type: string
                universitas:
                  type: string
                jurusan:
                  type: string
                jenjang:
                  type: string
                ipk:
                  type: number
                tahun_masuk:
                  type: integer
                tahun_lulus:
                  type: integer
                linkedin:
                  type: string
                instagram:
                  type: string
                notelp:
                  type: string
      responses:
        '200':
          description: Profil diperbarui
    put:
      tags: [Intern]
      summary: Update profil intern via JSON atau form-data
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profil diperbarui

  /intern/start-test:
    post:
      tags: [Intern]
      summary: Mulai pre-test
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Test dimulai
        '403':
          description: Profil belum lengkap atau test sudah selesai

  /intern/submit-test:
    post:
      tags: [Intern]
      summary: Submit jawaban pre-test
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PretestSubmitRequest'
      responses:
        '200':
          description: Tes berhasil dikirim
        '422':
          description: Jawaban tidak valid atau waktu habis

  /intern/apply:
    post:
      tags: [Intern]
      summary: Lamar lowongan
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobApplyRequest'
      responses:
        '200':
          description: Lamaran berhasil terkirim
        '403':
          description: Profil atau tes belum selesai

  /intern/applications:
    get:
      tags: [Intern]
      summary: Daftar lamaran intern
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Daftar lamaran user aktif

  /company/profile:
    get:
      tags: [Company]
      summary: Ambil profil company
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profil company

  /company/profile/update:
    post:
      tags: [Company]
      summary: Update profil company
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profil diperbarui

  /company/dashboard:
    get:
      tags: [Company]
      summary: Ambil dashboard company
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Statistik dashboard

  /company/jobs:
    get:
      tags: [Company]
      summary: Daftar lowongan milik company
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Daftar lowongan
    post:
      tags: [Company]
      summary: Buat lowongan baru
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompanyJobRequest'
      responses:
        '201':
          description: Lowongan berhasil dibuat
        '403':
          description: Company belum aktif

  /company/jobs/{id}:
    put:
      tags: [Company]
      summary: Update lowongan
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompanyJobRequest'
      responses:
        '200':
          description: Lowongan berhasil diupdate
    delete:
      tags: [Company]
      summary: Hapus lowongan
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Lowongan berhasil dihapus

  /company/jobs/{jobId}/applicants:
    get:
      tags: [Company]
      summary: Ambil pelamar per lowongan
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/JobIdPath'
      responses:
        '200':
          description: Daftar pelamar

  /company/applications/{id}/status:
    put:
      tags: [Company]
      summary: Update status pelamar
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobStatusUpdateRequest'
      responses:
        '200':
          description: Status pelamar diperbarui

  /company/talent/candidates:
    get:
      tags: [Talent Pool]
      summary: Daftar kandidat company
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Kandidat dan statistik

  /company/talent/candidates/{id}/detail:
    get:
      tags: [Talent Pool]
      summary: Detail kandidat
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Detail kandidat

  /company/talent/candidates/manual:
    post:
      tags: [Talent Pool]
      summary: Tambah kandidat manual
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CandidateManualRequest'
      responses:
        '200':
          description: Kandidat manual berhasil dibuat

  /company/talent/candidates/{id}/status:
    put:
      tags: [Talent Pool]
      summary: Update status kandidat
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobStatusUpdateRequest'
      responses:
        '200':
          description: Status kandidat diperbarui

  /company/talent/selected:
    get:
      tags: [Talent Pool]
      summary: Daftar kandidat terpilih
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Kandidat terpilih

  /admin/profile:
    get:
      tags: [Admin]
      summary: Profil admin login
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profil admin

  /admin/profile/update:
    post:
      tags: [Admin]
      summary: Update profil admin
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profil admin diperbarui

  /admin/profile/change-password:
    post:
      tags: [Admin]
      summary: Ganti password admin
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Password diperbarui
    put:
      tags: [Admin]
      summary: Alias ganti password admin
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Password diperbarui

  /admin/overview:
    get:
      tags: [Admin]
      summary: Dashboard admin
